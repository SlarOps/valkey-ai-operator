apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${name}
  namespace: ${namespace}
spec:
  serviceName: ${name}-headless
  replicas: ${replicas}
  selector:
    matchLabels:
      app: ${name}
  template:
    metadata:
      labels:
        app: ${name}
    spec:
      containers:
        - name: valkey
          image: ${image}
          ports:
            - containerPort: ${port:6379}
              name: client
            - containerPort: 16379
              name: gossip
          command: ["valkey-server"]
          args: ["/etc/valkey/valkey.conf"]
          resources:
            limits:
              memory: ${memory_limit:1Gi}
              cpu: ${cpu_limit:500m}
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: ${name}-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: ${storage:1Gi}
