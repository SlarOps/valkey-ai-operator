apiVersion: v1
kind: ConfigMap
metadata:
  name: ${name}-config
  namespace: ${namespace}
data:
  postgresql.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 10
    wal_keep_size = 256MB
    hot_standby = on
    max_connections = ${max_connections:100}
  pg_hba.conf: |
    local all all trust
    host all all 0.0.0.0/0 md5
    host replication replicator 0.0.0.0/0 md5
