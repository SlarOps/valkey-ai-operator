apiVersion: krust.io/v1
kind: AIResource
metadata:
  name: my-valkey
spec:
  skill: valkey-cluster
  goal: "Run a Valkey instance, 1Gi memory"
  image: valkey/valkey:7
  resources:
    limits:
      memory: "1Gi"
      cpu: "500m"
  agent:
    provider: vertex
    project_id: your-gcp-project-id
    region: us-east5
    model: claude-haiku-4-5@20251001
