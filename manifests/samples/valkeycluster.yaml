apiVersion: valkey.krust.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: my-valkey
  namespace: default
spec:
  version: "7"
  masters: 3
  replicas_per_master: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  agent:
    enabled: true
    self_healing: true
    health_check_interval: 30
    max_memory_scale_factor: 4.0
    provider: vertex
    region: us-east5
    project_id: your-gcp-project-id
