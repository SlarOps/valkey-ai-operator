apiVersion: apps/v1
kind: Deployment
metadata:
  name: krust-operator
  namespace: krust-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krust-operator
  template:
    metadata:
      labels:
        app: krust-operator
    spec:
      serviceAccountName: krust-operator
      containers:
        - name: krust-operator
          image: krust-operator:latest
          env:
            - name: RUST_LOG
              value: "info,krust_operator=debug"
            - name: SKILLS_DIR
              value: "/skills"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: skills
              mountPath: /skills
              readOnly: true
      volumes:
        - name: skills
          configMap:
            name: krust-skills
            optional: true
