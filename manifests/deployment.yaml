apiVersion: apps/v1
kind: Deployment
metadata:
  name: pilotis-operator
  namespace: pilotis-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pilotis-operator
  template:
    metadata:
      labels:
        app: pilotis-operator
    spec:
      serviceAccountName: pilotis-operator
      containers:
        - name: pilotis-operator
          image: pilotis-operator:latest
          env:
            - name: RUST_LOG
              value: "info,pilotis_operator=debug"
            - name: SKILLS_DIR
              value: "/skills"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: skills
              mountPath: /skills
              readOnly: true
      volumes:
        - name: skills
          configMap:
            name: pilotis-skills
            optional: true
