apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: airesources.krust.io
spec:
  group: krust.io
  names:
    categories: []
    kind: AIResource
    plural: airesources
    shortNames: []
    singular: airesource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.skill
      name: Skill
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AIResourceSpec via `CustomResource`
        properties:
          spec:
            description: Desired state of an AIResource.
            properties:
              agent:
                description: AI agent configuration.
                nullable: true
                properties:
                  api_key_secret_ref:
                    description: Reference to a secret containing the agent's API key.
                    nullable: true
                    properties:
                      key:
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  enabled:
                    default: true
                    description: Whether the agent is enabled.
                    type: boolean
                  llm_call_timeout:
                    default: 60s
                    description: Timeout for a single LLM call (e.g. "60s").
                    type: string
                  max_iterations:
                    default: 30
                    description: Maximum number of agent iterations per reconciliation loop.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  model:
                    description: Model name/ID override.
                    nullable: true
                    type: string
                  pipeline_timeout:
                    default: 300s
                    description: Total timeout for a single agent pipeline run (e.g. "300s").
                    type: string
                  project_id:
                    description: Cloud project ID (e.g. for Vertex AI).
                    nullable: true
                    type: string
                  provider:
                    default: anthropic
                    description: LLM provider (e.g. "anthropic", "vertex").
                    type: string
                  region:
                    description: Cloud region for the provider (e.g. "us-central1").
                    nullable: true
                    type: string
                type: object
              goal:
                description: High-level goal the agent should achieve.
                type: string
              guardrails:
                description: Guardrails that constrain agent actions.
                nullable: true
                properties:
                  denied_commands:
                    description: Shell commands the agent is not allowed to execute.
                    items:
                      type: string
                    type: array
                  max_memory:
                    description: Maximum memory the agent may allocate (e.g. "4Gi").
                    nullable: true
                    type: string
                  max_replicas:
                    description: Maximum number of replicas the agent may create.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              image:
                description: Container image (optional — Helm-based skills use chart defaults).
                nullable: true
                type: string
              resources:
                description: CPU/memory resource requirements for the workload pod.
                nullable: true
                properties:
                  limits:
                    description: CPU/memory resource specification.
                    nullable: true
                    properties:
                      cpu:
                        description: CPU amount (e.g. "500m", "1").
                        nullable: true
                        type: string
                      memory:
                        description: Memory amount (e.g. "512Mi", "1Gi").
                        nullable: true
                        type: string
                    type: object
                  requests:
                    description: CPU/memory resource specification.
                    nullable: true
                    properties:
                      cpu:
                        description: CPU amount (e.g. "500m", "1").
                        nullable: true
                        type: string
                      memory:
                        description: Memory amount (e.g. "512Mi", "1Gi").
                        nullable: true
                        type: string
                    type: object
                type: object
              skill:
                description: The skill (capability) this resource exercises (e.g. "valkey-cluster").
                type: string
            required:
            - goal
            - skill
            type: object
          status:
            description: Observed state of an AIResource.
            nullable: true
            properties:
              conditions:
                description: List of conditions on this resource.
                items:
                  description: A single condition on the AIResource.
                  properties:
                    message:
                      description: Human-readable message about the condition.
                      nullable: true
                      type: string
                    reason:
                      description: Machine-readable reason for the condition.
                      nullable: true
                      type: string
                    status:
                      description: Status of the condition ("True", "False", "Unknown").
                      type: string
                    type:
                      description: Type of the condition (e.g. "Ready", "Healing").
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              last_agent_action:
                description: Description of the last action taken by the agent.
                nullable: true
                type: string
              last_agent_action_time:
                description: Timestamp of the last agent action (RFC 3339).
                nullable: true
                type: string
              message:
                description: Human-readable status message.
                nullable: true
                type: string
              monitor_state:
                additionalProperties: true
                description: Arbitrary key-value state reported by the agent's monitor.
                nullable: true
                type: object
              phase:
                description: High-level lifecycle phase.
                enum:
                - Pending
                - Initializing
                - Running
                - Healing
                - Failed
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: AIResource
        type: object
    served: true
    storage: true
    subresources:
      status: {}
